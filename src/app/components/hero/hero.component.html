<section class="hero">
  <div class="hero-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="hero-inner">
    <div class="hero-text">
      <span class="badge">Open to new opportunities</span>
      <p class="greeting">Hi, I'm</p>
      <h1>
        <span class="name-gradient">Houda</span><br />
        Kamoun
      </h1>
      <p class="role">Multimedia & Marketing Specialist · Web Developer</p>

      <p class="desc">
        Passionate about web development and design, I build modern, dynamic,
        and innovative solutions for the web.
      </p>

      <div class="hero-actions">
        <a routerLink="/projects" class="btn btn-primary">View my projects</a>
        <a routerLink="/contact" class="btn btn-outline">Contact me</a>
      </div>

      <div class="hero-stats">
        <div class="stat">
          <strong>5+</strong>
          <span>Projects</span>
        </div>
        <div class="stat">
          <strong>3</strong>
          <span>Years exp.</span>
        </div>
        <div class="stat">
          <strong>Full Stack</strong>
          <span>Angular · Node</span>
        </div>
      </div>
    </div>

    <div class="hero-img">
      <div class="avatar-ring">
        <img
          src="assets/img/hero.jpg"
          alt="Houda Kamoun"
          (error)="showFallback = true"
          [class.hidden]="showFallback"
        />
        <div class="avatar-fallback" *ngIf="showFallback">HK</div>
      </div>
      <div class="orbit orbit-1"></div>
      <div class="orbit orbit-2"></div>
    </div>
  </div>

  <a href="#skills" class="scroll-hint" aria-label="Scroll down">
    <span class="scroll-mouse"></span>
  </a>
</section>
