<header class="navbar" [class.scrolled]="scrolled">
  <a routerLink="/" class="brand" (click)="closeMenu()">
    <span class="brand-initials">HK</span>
    <span class="brand-text">
      <span class="brand-name">Houda Kamoun</span>
      <span class="brand-role">Web Developer</span>
    </span>
  </a>

  <button
    class="menu-toggle"
    type="button"
    (click)="toggleMenu()"
    [class.open]="menuOpen"
    [attr.aria-expanded]="menuOpen"
    aria-label="Navigation menu"
  >
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <nav class="nav-links" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
    <a routerLink="/experience" routerLinkActive="active" (click)="closeMenu()">Experience</a>
    <a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a>
    <a routerLink="/contact" routerLinkActive="active" class="nav-cta" (click)="closeMenu()">Contact</a>
  </nav>
</header>
